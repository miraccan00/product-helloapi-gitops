apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: helloapi
    releaseName: product-helloapi
    version: "0.1.0"
    repo: ""
    chart: ../../chart
    valuesFile: ../../chart/values.yaml
    valuesInline:
      replicaCount: 2
      env: production
      message: "Hello from helloapi [PROD]"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
