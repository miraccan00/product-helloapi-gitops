apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <body style="font-family: monospace; padding: 2rem;">
      <h1>{{ .Release.Name }}</h1>
      <table>
        <tr><td><b>Environment</b></td><td>{{ .Values.env }}</td></tr>
        <tr><td><b>Replicas</b></td><td>{{ .Values.replicaCount }}</td></tr>
        <tr><td><b>Message</b></td><td>{{ .Values.message }}</td></tr>
        <tr><td><b>CPU request</b></td><td>{{ .Values.resources.requests.cpu }}</td></tr>
        <tr><td><b>Memory request</b></td><td>{{ .Values.resources.requests.memory }}</td></tr>
      </table>
    </body>
    </html>
